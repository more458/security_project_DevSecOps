name: DevSecOps Secure Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # JOB 1: Escaneo de Secretos
  secret-scan:
    name: Secret Detection Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0 # Gitleaks necesita el historial completo para revisar commits

      - name: Run Gitleaks Scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # JOB 2: Análisis Estático de Código (SAST)
  sast-scan:
    name: PHP Static Application Security Testing
    runs-on: ubuntu-latest
    needs: secret-scan # Solo se ejecuta si el paso anterior fue exitoso
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Run Semgrep Scan
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" returntocorp/semgrep semgrep scan --config=auto --error

  # JOB 3: Escaneo de Dependencias de Terceros (SCA)
  sca-scan:
    name: PHP Dependency Security Checker
    runs-on: ubuntu-latest
    needs: sast-scan
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Local PHP Security Checker
        run: |
          curl -sSL -o security-checker \
            https://github.com/fabpot/local-php-security-checker/releases/download/v2.1.3/local-php-security-checker_linux_amd64
          chmod +x security-checker
          file security-checker | grep -q ELF || { echo "Descarga inválida"; head -c 500 security-checker; exit 1; }

      - name: Generate production-only lock
        run: |
          # Copia el lock a un directorio temporal y quita packages-dev
          mkdir -p prod-scan
          jq 'del(."packages-dev")' composer.lock > prod-scan/composer.lock
          # El checker también necesita un composer.json presente
          cp composer.json prod-scan/composer.json
          echo "Paquetes de dev filtrados. Escaneando solo producción."

      - name: Check composer.lock for Vulnerabilities (production only)
        run: ./security-checker --path=prod-scan/composer.lock


  # JOB 4: Construcción y Escaneo de la Imagen de Docker
  docker-security:
    name: Build and Scan Docker Image
    runs-on: ubuntu-latest
    needs: sca-scan
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Build Local Docker Image
        run: docker build -t mi-ecommerce-app:latest .

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.58.1
          trivy --version

      - name: Run Trivy Vulnerability Scanner
        run: |
          trivy image \
            --exit-code 1 \
            --ignore-unfixed \
            --severity CRITICAL,HIGH \
            --format table \
            --output trivy-report.txt \
            mi-ecommerce-app:latest

      - name: Show Trivy Report
        if: always()
        run: |
          if [ -f trivy-report.txt ]; then
            cat trivy-report.txt
          else
            echo "⚠️  Trivy no generó reporte."
          fi