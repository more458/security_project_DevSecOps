name: DevSecOps Secure Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # JOB 1: Escaneo de Secretos
  secret-scan:
    name: Secret Detection Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0 # Gitleaks necesita el historial completo para revisar commits

      - name: Run Gitleaks Scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # JOB 2: Análisis Estático de Código (SAST)
  sast-scan:
    name: PHP Static Application Security Testing
    runs-on: ubuntu-latest
    needs: secret-scan # Solo se ejecuta si el paso anterior fue exitoso
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Run Semgrep Scan
        run: |
          docker run --rm -v "${{ github.workspace }}:/src" returntocorp/semgrep semgrep scan --config=auto --error

  # JOB 3: Escaneo de Infraestructura como Código (IaC)
  iac-scan:
    name: IaC Security Scan (Checkov)
    runs-on: ubuntu-latest
    needs: secret-scan   # Paralelo con sast-scan
    permissions:
      contents: read
      security-events: write   # Necesario para subir SARIF a Security tab
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: Install Checkov
        run: |
          python -m pip install --upgrade pip
          pip install checkov==3.2.334

      - name: Run Checkov Scan
        id: checkov
        continue-on-error: true
        run: |
          echo "=== Corriendo Checkov ==="
          checkov \
            --directory . \
            --framework dockerfile github_actions secrets \
            --output cli \
            --output sarif \
            --output-file-path console,checkov-results.sarif \
            --soft-fail || true
          
          echo "=== Verificando SARIF generado ==="
          if [ -s checkov-results.sarif ]; then
            echo "✅ SARIF generado correctamente"
            echo "Tamaño: $(wc -c < checkov-results.sarif) bytes"
          else
            echo "⚠️ SARIF no generado, creando fallback vacío para no romper upload"
            echo '{"version":"2.1.0","$schema":"https://json.schemastore.org/sarif-2.1.0.json","runs":[{"tool":{"driver":{"name":"checkov","rules":[]}},"results":[]}]}' > checkov-results.sarif
          fi


      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@181d5eefc20863364f96762470ba6f862bdef56b  # v3.29.2
        with:
          sarif_file: checkov-results.sarif
          category: checkov

  # JOB 4: Escaneo de Dependencias de Terceros (SCA)
  sca-scan:
    name: PHP Dependency Security Checker
    runs-on: ubuntu-latest
    needs: [sast-scan, iac-scan]
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Local PHP Security Checker
        run: |
          curl -sSL -o security-checker \
            https://github.com/fabpot/local-php-security-checker/releases/download/v2.1.3/local-php-security-checker_linux_amd64
          chmod +x security-checker
          file security-checker | grep -q ELF || { echo "Descarga inválida"; head -c 500 security-checker; exit 1; }

      - name: Generate production-only lock
        run: |
          # Copia el lock a un directorio temporal y quita packages-dev
          mkdir -p prod-scan
          jq 'del(."packages-dev")' composer.lock > prod-scan/composer.lock
          # El checker también necesita un composer.json presente
          cp composer.json prod-scan/composer.json
          echo "Paquetes de dev filtrados. Escaneando solo producción."

      - name: Check composer.lock for Vulnerabilities (production only)
        run: ./security-checker --path=prod-scan/composer.lock


  # JOB 5: Construcción y Escaneo de la Imagen de Docker
  docker-security:
    name: Build and Scan Docker Image
    runs-on: ubuntu-latest
    needs: sca-scan
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Build Local Docker Image
        run: docker build -t mi-ecommerce-app:latest .

      - name: Install Trivy
        env:
          TRIVY_VERSION: "0.72.0"
        run: |
          # Descargar archivo de checksums
          curl -sSL -o trivy_checksums.txt \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_checksums.txt"
          
          echo "--- Contenido de checksums.txt ---"
          cat trivy_checksums.txt
          echo "----------------------------------"
          
          # Detectar el nombre real del asset para Linux 64-bit
          ASSET_NAME=$(grep -iE "linux[-_](64bit|amd64|x86_64)\.tar\.gz$" trivy_checksums.txt | head -1 | awk '{print $2}')
          
          if [ -z "$ASSET_NAME" ]; then
            echo "❌ No se encontró asset Linux 64-bit en checksums.txt"
            exit 1
          fi
          echo "✅ Asset detectado: $ASSET_NAME"
          
          # Descargar el binario
          curl -sSL -o trivy.tar.gz \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/${ASSET_NAME}"
          
          # Verificar checksum
          EXPECTED=$(grep "${ASSET_NAME}$" trivy_checksums.txt | awk '{print $1}')
          ACTUAL=$(sha256sum trivy.tar.gz | awk '{print $1}')
          
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "❌ Checksum inválido"
            echo "  Esperado: $EXPECTED"
            echo "  Obtenido: $ACTUAL"
            exit 1
          fi
          echo "✅ Checksum verificado"
          
          # Instalar
          tar -xzf trivy.tar.gz trivy
          sudo mv trivy /usr/local/bin/
          rm trivy.tar.gz trivy_checksums.txt
          trivy --version

      - name: Show Trivy Report
        if: always()
        run: |
          if [ -f trivy-report.txt ]; then
            cat trivy-report.txt
          else
            echo "⚠️  Trivy no generó reporte."
          fi